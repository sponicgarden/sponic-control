  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f7f1; --surface: #fff; --border: #c4d4ba; --border-light: #d8e3cf;
      --text: #1a2412; --text-dim: #4a6040; --text-muted: #7a9168;
      --green: #2d6a1e; --green-soft: rgba(45,106,30,0.07); --green-border: rgba(45,106,30,0.2);
      --gold: #c9a961; --gold-soft: rgba(201,169,97,0.08);
      --red: #b91c1c; --red-soft: rgba(185,28,28,0.06); --red-border: rgba(185,28,28,0.2);
      --blue: #1d4ed8; --blue-soft: rgba(29,78,216,0.06);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }

    /* Header */
    .page-header { text-align: center; padding: 3rem 2rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .page-header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.8rem,4vw,2.8rem); color: var(--green); letter-spacing: -0.02em; }
    .page-header p { color: var(--text-dim); font-size: 0.92rem; max-width: 550px; margin: 0.3rem auto 0; }

    /* Filter bar */
    .filter-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.8rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
    .filter-btn { padding: 0.3rem 0.8rem; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); font-size: 0.78rem; font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: var(--green); color: white; border-color: var(--green); }
    .filter-btn .badge { display: inline-block; background: rgba(0,0,0,0.15); padding: 0 0.4rem; border-radius: 10px; margin-left: 0.3rem; font-size: 0.7rem; }
    .filter-btn.active .badge { background: rgba(255,255,255,0.3); }
    .filter-spacer { flex: 1; }
    .export-btn { padding: 0.3rem 0.8rem; border-radius: 20px; border: 1px solid var(--green-border); background: var(--green-soft); font-size: 0.78rem; font-weight: 600; color: var(--green); cursor: pointer; }

    /* Style direction banner */
    .style-banner { display: none; padding: 0.8rem 1.5rem; background: var(--gold-soft); border-bottom: 1px solid rgba(201,169,97,0.3); font-size: 0.85rem; color: #92400e; }
    .style-banner.visible { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .style-banner strong { color: #78350f; }
    .style-banner .clear-style { cursor: pointer; text-decoration: underline; margin-left: auto; font-size: 0.78rem; }

    /* Container */
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }

    /* Sections */
    .section { margin-bottom: 2.5rem; }
    .section-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.2rem; }

    /* Cards */
    .card { background: var(--surface); border: 2px solid var(--border-light); border-radius: 10px; overflow: hidden; transition: all 0.2s; position: relative; }

    /* Rank badge */
    .rank-badge { position: absolute; top: 0.5rem; left: 0.5rem; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; z-index: 10; }
    .rank-badge.champion { background: var(--gold); color: #fff; box-shadow: 0 2px 8px rgba(201,169,97,0.5); }
    .rank-badge.challenger { background: #7a9168; color: #fff; }
    .rank-badge.ranked { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }

    /* Rank controls */
    .rank-controls { position: absolute; top: 0.5rem; right: 0.5rem; display: flex; flex-direction: column; gap: 2px; z-index: 10; }
    .rank-btn { width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.6); background: rgba(0,0,0,0.35); color: #fff; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: all 0.15s; }
    .rank-btn:hover { background: rgba(0,0,0,0.6); }
    .card.liked { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
    .card.disliked { border-color: var(--red); opacity: 0.5; }
    .card.regen-requested { border-color: #1d4ed8; box-shadow: 0 0 0 1px #1d4ed8; animation: pulse-blue 2s ease-in-out infinite; }
    .card.regenerated { border-color: #059669; box-shadow: 0 0 0 2px #059669; }
    @keyframes pulse-blue { 0%,100% { box-shadow: 0 0 0 1px #1d4ed8; } 50% { box-shadow: 0 0 12px 2px rgba(29,78,216,0.3); } }
    .gen-status { position: absolute; bottom: 0.5rem; right: 0.5rem; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.65rem; font-weight: 600; z-index: 10; }
    .gen-status.generating { background: rgba(29,78,216,0.9); color: #fff; animation: pulse-blue 2s ease-in-out infinite; }
    .gen-status.ready { background: rgba(5,150,105,0.9); color: #fff; cursor: pointer; }
    .card.disliked:hover { opacity: 0.8; }
    .card.selected { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold), 0 4px 20px rgba(201,169,97,0.2); }
    .card.hidden { display: none; }
    .card-img { width: 100%; display: block; cursor: pointer; }
    .card-img.logo-fit { padding: 1.5rem; object-fit: contain; max-height: 280px; background: #fff; }

    .card-body { padding: 0.8rem 1rem; border-top: 1px solid var(--border-light); }
    .card-body h3 { font-size: 0.88rem; font-weight: 600; margin-bottom: 0.15rem; }
    .card-body .desc { font-size: 0.78rem; color: var(--text-dim); line-height: 1.45; }
    .card-body .model { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.3rem; }

    /* Action buttons */
    .card-actions { display: flex; gap: 0.4rem; padding: 0.5rem 1rem; border-top: 1px solid var(--border-light); background: #fafdf7; }
    .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.3rem; padding: 0.4rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); font-size: 0.75rem; font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
    .action-btn:hover { background: var(--bg); }
    .action-btn.like-active { background: var(--green-soft); border-color: var(--green-border); color: var(--green); }
    .action-btn.dislike-active { background: var(--red-soft); border-color: var(--red-border); color: var(--red); }
    .action-btn.style-active { background: var(--gold-soft); border-color: rgba(201,169,97,0.4); color: #92400e; }

    /* Comment */
    .card-comment { padding: 0.5rem 1rem 0.8rem; border-top: 1px solid var(--border-light); display: flex; gap: 0.4rem; align-items: flex-start; }
    .card-comment textarea { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.78rem; font-family: inherit; resize: vertical; min-height: 2.2rem; background: var(--bg); color: var(--text); }
    .card-comment textarea:focus { outline: none; border-color: var(--green); }
    .comment-btn { padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid; font-size: 0.7rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .btn-note { border-color: var(--border); background: var(--bg); color: var(--text-dim); }
    .btn-note:hover { background: var(--surface); }
    .btn-note.saved { background: var(--green-soft); color: var(--green); border-color: var(--green-border); }
    .btn-newgen { border-color: rgba(29,78,216,0.3); background: rgba(29,78,216,0.08); color: #1d4ed8; }
    .btn-newgen:hover { background: rgba(29,78,216,0.15); }
    .btn-newgen.saved { background: rgba(29,78,216,0.15); color: #1d4ed8; }

    /* Toast */
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 0.6rem 1.2rem; background: var(--green); color: white; border-radius: 8px; font-size: 0.82rem; font-weight: 500; z-index: 1000; opacity: 0; transform: translateY(10px); transition: all 0.3s; }
    .toast.show { opacity: 1; transform: translateY(0); }

    .footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.78rem; }

    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 8px; }
    .lightbox .lb-close { position: absolute; top: 1.5rem; right: 1.5rem; color: white; font-size: 2rem; cursor: pointer; background: none; border: none; line-height: 1; opacity: 0.7; }
    .lightbox .lb-close:hover { opacity: 1; }
    .lightbox .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 2.5rem; cursor: pointer; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; opacity: 0.6; transition: opacity 0.15s; }
    .lightbox .lb-nav:hover { opacity: 1; background: rgba(255,255,255,0.2); }
    .lightbox .lb-prev { left: 1rem; }
    .lightbox .lb-next { right: 1rem; }
    .lightbox .lb-title { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); color: white; font-size: 0.85rem; background: rgba(0,0,0,0.5); padding: 0.4rem 1rem; border-radius: 6px; white-space: nowrap; }
  </style>

      { id: '44-style-gouache-modern', cat: 'style-audition', title: 'Modern Gouache', desc: 'Monocle/NYT editorial illustration. Flat brushstrokes, bold shapes.', model: 'nano-banana-pro', ext: 'jpg' },
      // Sonics wordmarks (sonics not music)
      { id: '50-sonics-organic-digital', cat: 'sonics-wordmark', title: 'Sonics — Organic→Digital', desc: 'Sonic waveforms and frequency spectra bridge circuit SPONIC to botanical GARDEN.', model: 'nano-banana-pro', ext: 'jpg', logo: true },
      { id: '51-sonics-gradient-bridge', cat: 'sonics-wordmark', title: 'Sonics — Gradient Bridge', desc: 'Sonic frequency patterns flow from tech to nature. Sound is the medium.', model: 'nano-banana-pro', ext: 'jpg', logo: true },
      { id: '52-sonics-clean-minimal', cat: 'sonics-wordmark', title: 'Sonics — Clean Minimal', desc: 'Oscilloscope waveform underline. Frequency spectrum bars from baseline.', model: 'nano-banana-pro', ext: 'jpg', logo: true },
      { id: '53-sonics-flowing-vines', cat: 'sonics-wordmark', title: 'Sonics — Flowing Vines', desc: 'Sonic waves that look like both sound and growing vines simultaneously.', model: 'nano-banana-pro', ext: 'jpg', logo: true },
      { id: '54-sonics-bold-contrast', cat: 'sonics-wordmark', title: 'Sonics — Bold Contrast', desc: 'Dramatic golden sonic pulse arc. Heartbeat/seismic energy. Signage-ready.', model: 'nano-banana-pro', ext: 'jpg', logo: true },
    ];

    const CAT_LABELS = {
      'chosen': 'Current Champion',
      'swapped-logo': 'Logo — Swapped (SPONIC=Digital, GARDEN=Botanical)',
      'wordmark': 'Wordmarks (Original Direction)',
      'logo': 'Logo Marks',
      'style-audition': 'Style Auditions — Choose the Pitch Deck Style',
      'scene': 'Concept Scenes',
      'app-icon': 'App Icons — SG Monogram',
      'artistic-style': '5 Artistic Styles',
      'blended': 'Blended — Botanical + Music + Spa + AI',
      'sonics-wordmark': 'Sonics Wordmarks — Sound as Bridge',
    };
    const CAT_ORDER = ['chosen', 'sonics-wordmark', 'swapped-logo', 'style-audition', 'wordmark', 'logo', 'app-icon', 'scene', 'artistic-style', 'blended'];

    let reviews = {}; // asset_id -> review data (includes rank_order)
    let currentFilter = 'all';

    // ── Rank helpers ──
    function getRankedAssets(cat) {
      const items = ASSETS.filter(a => a.cat === cat);
      return items.sort((a, b) => {
        const ra = reviews[a.id]?.rank_order ?? 999;
        const rb = reviews[b.id]?.rank_order ?? 999;
        if (ra !== rb) return ra - rb;
        return ASSETS.indexOf(a) - ASSETS.indexOf(b);
      });
    }

    function getRankLabel(rank) {
      if (rank === 0) return { label: '1', cls: 'champion', text: 'Champion' };
      if (rank === 1) return { label: '2', cls: 'challenger', text: 'Challenger #1' };
      if (rank === 2) return { label: '3', cls: 'challenger', text: 'Challenger #2' };
      return { label: String(rank + 1), cls: 'ranked', text: `#${rank + 1}` };
    }

    // ── Render ──
    function render() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      for (const cat of CAT_ORDER) {
        const items = getRankedAssets(cat);
        const section = document.createElement('div');
        section.className = 'section';
        section.innerHTML = `<div class="section-label">${CAT_LABELS[cat] || cat}</div><div class="grid" id="grid-${cat}"></div>`;
        gallery.appendChild(section);
        const grid = section.querySelector('.grid');

        items.forEach((asset, idx) => {
          const r = reviews[asset.id] || {};
          const status = r.status || 'pending';
          const isStyleDir = r.is_style_direction || false;
          const comment = r.comment || '';
          const rankInfo = getRankLabel(idx);

          // Filter logic
          let visible = currentFilter === 'all' ||
            (currentFilter === 'liked' && status === 'liked') ||
            (currentFilter === 'disliked' && status === 'disliked') ||
            (currentFilter === 'selected' && isStyleDir) ||
            (currentFilter === 'pending' && status === 'pending');

          const card = document.createElement('div');
          card.className = `card ${status} ${isStyleDir ? 'selected' : ''} ${!visible ? 'hidden' : ''}`;
          card.dataset.assetId = asset.id;
          card.innerHTML = `
            <div class="rank-badge ${rankInfo.cls}">${rankInfo.label}</div>
            ${items.length > 1 ? `
            <div class="rank-controls">
              ${idx > 0 ? `<button class="rank-btn" onclick="moveRank('${cat}','${asset.id}',-1)" title="Move up">&#9650;</button>` : ''}
              ${idx < items.length - 1 ? `<button class="rank-btn" onclick="moveRank('${cat}','${asset.id}',1)" title="Move down">&#9660;</button>` : ''}
            </div>` : ''}
            ${status === 'regen-requested' && r.metadata?.job_queued ? '<div class="gen-status generating">⏳ Generating...</div>' : ''}
            ${status === 'regenerated' && r.metadata?.result_url ? `<div class="gen-status ready" onclick="window.open('${r.metadata.result_url}')">✅ New version</div>` : ''}
            <img class="card-img ${asset.logo ? 'logo-fit' : ''}" src="${IMG_BASE}/${asset.id}.${asset.ext}" alt="${asset.title}" loading="lazy" onclick="openLightbox('${asset.id}')" style="cursor:zoom-in">
            <div class="card-body">
              <h3>${asset.title}</h3>
              <div class="desc">${asset.desc}</div>
              <div class="model">${asset.model} · ${rankInfo.text}</div>
            </div>
            <div class="card-actions">
              <button class="action-btn ${status === 'liked' ? 'like-active' : ''}" onclick="setStatus('${asset.id}', 'liked')">
                ${status === 'liked' ? '&#9989;' : '&#128077;'} Like
              </button>
              <button class="action-btn ${status === 'disliked' ? 'dislike-active' : ''}" onclick="setStatus('${asset.id}', 'disliked')">
                ${status === 'disliked' ? '&#10060;' : '&#128078;'} Pass
              </button>
              <button class="action-btn ${isStyleDir ? 'style-active' : ''}" onclick="setStyleDirection('${asset.id}')">
                ${isStyleDir ? '&#11088;' : '&#127775;'} Use Style
              </button>
            </div>
            <div class="card-comment">
              <textarea placeholder="Describe a variation or leave a note..." id="comment-${asset.id}">${comment}</textarea>
              <button class="comment-btn btn-newgen" onclick="requestNewGen('${asset.id}')">NewGen</button>
              <button class="comment-btn btn-note" onclick="saveNote('${asset.id}')">Note</button>
            </div>
          `;
          grid.appendChild(card);
        });
      }
      updateCounts();
      updateStyleBanner();
    }

    function updateCounts() {
      let all = 0, liked = 0, disliked = 0, selected = 0, pending = 0;
      for (const a of ASSETS) {
        all++;
        const r = reviews[a.id] || {};
        const s = r.status || 'pending';
        if (s === 'liked') liked++;
        else if (s === 'disliked') disliked++;
        else pending++;
        if (r.is_style_direction) selected++;
      }
      document.getElementById('count-all').textContent = all;
      document.getElementById('count-liked').textContent = liked;
      document.getElementById('count-disliked').textContent = disliked;
      document.getElementById('count-selected').textContent = selected;
      document.getElementById('count-pending').textContent = pending;
    }

    function updateStyleBanner() {
      const banner = document.getElementById('styleBanner');
      const dirs = ASSETS.filter(a => (reviews[a.id] || {}).is_style_direction);
      if (dirs.length > 0) {
        document.getElementById('styleDirectionName').textContent = dirs.map(d => d.title).join(', ');
        banner.classList.add('visible');
      } else {
        banner.classList.remove('visible');
      }
    }

    // ── Actions ──
    async function setStatus(assetId, status) {
      const current = (reviews[assetId] || {}).status;
      const newStatus = current === status ? 'pending' : status; // toggle
      reviews[assetId] = { ...(reviews[assetId] || {}), status: newStatus, reviewed_at: new Date().toISOString() };
      await upsert(assetId);
      render();
      showToast(`${newStatus === 'liked' ? 'Liked' : newStatus === 'disliked' ? 'Passed' : 'Reset'}`);
    }

    async function setStyleDirection(assetId) {
      const current = (reviews[assetId] || {}).is_style_direction;
      // Clear all other style directions first
      for (const id of Object.keys(reviews)) {
        if (reviews[id].is_style_direction && id !== assetId) {
          reviews[id].is_style_direction = false;
          await upsert(id);
        }
      }
      reviews[assetId] = { ...(reviews[assetId] || {}), is_style_direction: !current, status: !current ? 'liked' : (reviews[assetId]?.status || 'pending'), reviewed_at: new Date().toISOString() };
      await upsert(assetId);
      render();
      const asset = ASSETS.find(a => a.id === assetId);
      showToast(!current ? `Style direction: ${asset.title}` : 'Style direction cleared');
    }

    // ── Rank reorder ──
    async function moveRank(cat, assetId, direction) {
      const items = getRankedAssets(cat);
      const currentIdx = items.findIndex(a => a.id === assetId);
      const newIdx = currentIdx + direction;
      if (newIdx < 0 || newIdx >= items.length) return;
      [items[currentIdx], items[newIdx]] = [items[newIdx], items[currentIdx]];
      for (let i = 0; i < items.length; i++) {
        reviews[items[i].id] = { ...(reviews[items[i].id] || {}), rank_order: i, reviewed_at: new Date().toISOString() };
        await upsert(items[i].id);
      }
      render();
      showToast(`Moved to #${newIdx + 1}`);
    }

    async function clearStyleDirection() {
      for (const id of Object.keys(reviews)) {
        if (reviews[id].is_style_direction) {
          reviews[id].is_style_direction = false;
          await upsert(id);
        }
      }
      render();
      showToast('Style direction cleared');
    }

    async function saveNote(assetId) {
      const textarea = document.getElementById(`comment-${assetId}`);
      const noteBtn = textarea?.parentElement?.querySelector('.btn-note');
      const comment = textarea?.value || '';
      reviews[assetId] = { ...(reviews[assetId] || {}), comment: comment.trim(), reviewed_at: new Date().toISOString() };
      await upsert(assetId);
      if (noteBtn) { noteBtn.textContent = 'Noted'; noteBtn.classList.add('saved'); setTimeout(() => { noteBtn.textContent = 'Note'; noteBtn.classList.remove('saved'); }, 2000); }
      showToast('Note saved');
    }

    async function requestNewGen(assetId) {
      const textarea = document.getElementById(`comment-${assetId}`);
      const genBtn = textarea?.parentElement?.querySelector('.btn-newgen');
      const prompt = textarea?.value?.trim();
      if (!prompt) { showToast('Describe the variation you want'); return; }
      reviews[assetId] = { ...(reviews[assetId] || {}), comment: prompt, status: 'regen-requested', reviewed_at: new Date().toISOString() };
      // Save with metadata flagging it for regeneration
      const asset = ASSETS.find(a => a.id === assetId);
      const r = reviews[assetId];
      const row = {
        asset_id: assetId,
        asset_category: asset?.cat || null,
        asset_url: `${IMG_BASE}/${assetId}.${asset?.ext || 'jpg'}`,
        status: 'regen-requested',
        is_style_direction: r.is_style_direction || false,
        comment: prompt,
        model_used: asset?.model || null,
        metadata: JSON.stringify({ regen_prompt: prompt, requested_at: new Date().toISOString() }),
        reviewed_at: new Date().toISOString(),
      };
      await sb.from('spgd_brand_reviews').upsert(row, { onConflict: 'asset_id' });
      if (genBtn) { genBtn.textContent = '⏳ Queued'; genBtn.classList.add('saved'); setTimeout(() => { genBtn.textContent = 'NewGen'; genBtn.classList.remove('saved'); }, 8000); }
      showToast('Generation queued — Gemini will generate in ~2 min');
      render();
      startStatusPolling();
    }

    // ── Supabase ──
    async function upsert(assetId) {
      const asset = ASSETS.find(a => a.id === assetId);
      const r = reviews[assetId] || {};
      const row = {
        asset_id: assetId,
        asset_category: asset?.cat || null,
        asset_url: `${IMG_BASE}/${assetId}.${asset?.ext || 'jpg'}`,
        status: r.status || 'pending',
        is_style_direction: r.is_style_direction || false,
        comment: r.comment || null,
        model_used: asset?.model || null,
        rank_order: r.rank_order ?? null,
        reviewed_at: r.reviewed_at || new Date().toISOString(),
      };
      const { error } = await sb.from('spgd_brand_reviews').upsert(row, { onConflict: 'asset_id' });
      if (error) console.error('Upsert error:', error);
    }

    async function loadReviews() {
      const { data, error } = await sb.from('spgd_brand_reviews').select('*');
      if (error) { console.error('Load error:', error); return; }
      for (const row of (data || [])) {
        reviews[row.asset_id] = row;
      }
    }

    // ── Filter ──
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    // ── Export ──
    function exportJSON() {
      const data = {};
      for (const cat of CAT_ORDER) {
        const ranked = getRankedAssets(cat);
        data[cat] = ranked.map((a, idx) => {
          const r = reviews[a.id] || {};
          return {
            rank: idx + 1,
            is_champion: idx === 0,
            is_challenger: idx === 1 || idx === 2,
            asset_id: a.id,
            title: a.title,
            description: a.desc,
            model: a.model,
            url: `${IMG_BASE}/${a.id}.${a.ext}`,
            status: r.status || 'pending',
            is_style_direction: r.is_style_direction || false,
            comment: r.comment || null,
            reviewed_at: r.reviewed_at || null,
          };
        });
      }
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `sponic-garden-brand-review-${new Date().toISOString().slice(0,10)}.json`; a.click();
      URL.revokeObjectURL(url);
      showToast('Exported JSON');
    }

    // ── Toast ──
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1500);
    }

    // ── Lightbox ──
    let lbIndex = -1;
    const allIds = () => ASSETS.map(a => a.id);

    function openLightbox(assetId) {
      const ids = allIds();
      lbIndex = ids.indexOf(assetId);
      if (lbIndex < 0) return;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
    }

    function updateLightbox() {
      const ids = allIds();
      const asset = ASSETS.find(a => a.id === ids[lbIndex]);
      if (!asset) return;
      document.getElementById('lb-img').src = `${IMG_BASE}/${asset.id}.${asset.ext}`;
      const catItems = getRankedAssets(asset.cat);
      const rankIdx = catItems.findIndex(a => a.id === asset.id);
      const rankInfo = getRankLabel(rankIdx >= 0 ? rankIdx : 0);
      document.getElementById('lb-title').textContent = `${asset.title} · ${rankInfo.text} in ${CAT_LABELS[asset.cat] || asset.cat} (${lbIndex + 1}/${ids.length})`;
    }

    function lbNav(dir) {
      const ids = allIds();
      lbIndex = (lbIndex + dir + ids.length) % ids.length;
      updateLightbox();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lbNav(1);
      if (e.key === 'ArrowLeft') lbNav(-1);
    });

    // ── Status Polling (for active regen jobs) ──
    let pollTimer = null;
    function startStatusPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(async () => {
        const hasActive = ASSETS.some(a => {
          const r = reviews[a.id] || {};
          return r.status === 'regen-requested';
        });
        if (!hasActive) { clearInterval(pollTimer); pollTimer = null; return; }
        await loadReviews();
        render();
      }, 30000); // poll every 30s
    }

    // ── Init ──
    (async () => {
      await loadReviews();
      render();
      // Auto-start polling if any regen jobs are active
      const hasActive = ASSETS.some(a => (reviews[a.id] || {}).status === 'regen-requested');
      if (hasActive) startStatusPolling();
    })();
  </script>

  <div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()">&times;</button>
    <button class="lb-nav lb-prev" onclick="lbNav(-1)">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-nav lb-next" onclick="lbNav(1)">&#8250;</button>
    <div class="lb-title" id="lb-title"></div>
  </div>
</body>
</html>

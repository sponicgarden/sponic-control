<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Projects - Sponic Garden Admin</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="apple-touch-icon" href="../../apple-touch-icon.png">
  <script>try{var c=localStorage.getItem("sponic-cached-auth");if(c&&JSON.parse(c).appUser)document.documentElement.dataset.cachedAuth="1"}catch(e){}</script>
  <style>.hidden{display:none!important}[data-cached-auth] #loadingOverlay{opacity:0!important;pointer-events:none!important;visibility:hidden!important}[data-cached-auth] #appContent.hidden{display:block!important}#loadingOverlay{position:fixed;inset:0;background:#f6f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .16s ease-out}.loading-overlay__logo{display:flex;align-items:center;gap:.75rem;min-height:40px}.loading-overlay__icon{height:40px;width:auto;max-width:none}.loading-overlay__wordmark{height:28px;width:auto;max-width:none}</style>
  <link rel="stylesheet" href="../styles.css?v=5">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="manage-shared.css?v=5">
  <style>
    :root {
      --p1: #ef4444; --p1-bg: #fef2f2;
      --p2: #f59e0b; --p2-bg: #fffbeb;
      --p3: #3b82f6; --p3-bg: #eff6ff;
      --p4: #6b7280; --p4-bg: #f9fafb;
    }

    .projects-page { max-width: 1100px; }

    /* Summary cards */
    .summary-cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.75rem; margin-bottom: 1.25rem;
    }
    .summary-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.75rem 1rem; text-align: center;
    }
    .summary-card .num { font-size: 1.5rem; font-weight: 700; }
    .summary-card .label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .summary-card.open .num { color: #2563eb; }
    .summary-card.in-progress .num { color: #d97706; }
    .summary-card.done .num { color: #16a34a; }
    .summary-card.on-hold .num { color: #9d174d; }

    /* Toolbar */
    .toolbar {
      display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
    }
    .toolbar select, .toolbar input[type="text"] {
      padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.85rem; background: var(--bg-card);
    }
    .toolbar input[type="text"] { flex: 1; min-width: 150px; }
    .btn-add {
      padding: 0.4rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      border: none; background: var(--accent); color: #fff; cursor: pointer; white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.9; }

    /* Task table */
    .task-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .task-table th {
      text-align: left; padding: 0.6rem 0.75rem; border-bottom: 2px solid var(--border);
      font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);
      cursor: pointer; white-space: nowrap; user-select: none;
    }
    .task-table th:hover { color: var(--text); }
    .task-table td {
      padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .task-table tr:hover td { background: var(--bg); }
    .task-table tr.done td { opacity: 0.55; }
    .task-table tr.on-hold td { opacity: 0.65; background: #fdf2f8; }
    .task-table .row-num-cell { color: var(--text-muted); opacity: 0.5; font-size: 0.8rem; text-align: right; font-variant-numeric: tabular-nums; }
    .task-table .title-cell { max-width: 350px; }
    .task-table .title-text { font-weight: 600; }
    .task-table tr.done .title-text { text-decoration: line-through; }
    .task-table .notes-text { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.15rem; }

    /* Priority badge */
    .priority-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 5px; font-size: 0.68rem; font-weight: 800;
    }
    .priority-badge.p1 { background: var(--p1-bg); color: var(--p1); }
    .priority-badge.p2 { background: var(--p2-bg); color: var(--p2); }
    .priority-badge.p3 { background: var(--p3-bg); color: var(--p3); }
    .priority-badge.p4 { background: var(--p4-bg); color: var(--p4); }

    /* Status badge */
    .status-badge {
      padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.72rem; font-weight: 600; white-space: nowrap;
    }
    .status-badge.open { background: #dbeafe; color: #1e40af; }
    .status-badge.in_progress { background: #fef3c7; color: #92400e; }
    .status-badge.done { background: #d1fae5; color: #065f46; }
    .status-badge.on_hold { background: #fce7f3; color: #9d174d; }

    /* Assignee badge */
    .assignee-badge {
      padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.72rem; font-weight: 600;
      background: #e0e7ff; color: #3730a3; white-space: nowrap;
    }

    /* Action buttons */
    .row-actions { display: flex; gap: 0.3rem; }
    .row-actions button {
      padding: 0.2rem 0.5rem; border-radius: 5px; font-size: 0.75rem; border: 1px solid var(--border);
      background: var(--bg-card); cursor: pointer; color: var(--text);
    }
    .row-actions button:hover { background: var(--border); }
    .row-actions .btn-del { color: #ef4444; border-color: #fca5a5; }
    .row-actions .btn-del:hover { background: #fef2f2; }

    /* Bulk actions */
    .bulk-bar {
      display: none; padding: 0.5rem 1rem; background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 8px; margin-bottom: 0.75rem; align-items: center; gap: 0.5rem; font-size: 0.85rem;
    }
    .bulk-bar.visible { display: flex; }
    .bulk-bar select { padding: 0.3rem; border-radius: 6px; border: 1px solid var(--border); font-size: 0.82rem; }
    .bulk-bar button {
      padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.82rem; font-weight: 600;
      border: none; background: var(--accent); color: #fff; cursor: pointer;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-card); border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 500px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 768px) {
      .modal-overlay { align-items: flex-start; padding: 1rem 0; overflow-y: auto; }
      .modal-box {
        max-height: none; margin: 0 auto;
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      }
    }
    .modal-box h3 { margin: 0 0 1rem; font-size: 1.1rem; }
    .modal-box label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--text-muted); }
    .modal-box input, .modal-box select, .modal-box textarea {
      width: 100%; box-sizing: border-box; padding: 0.5rem; border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.9rem; margin-bottom: 0.75rem; font-family: inherit;
    }
    .modal-box textarea { min-height: 60px; resize: vertical; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
    .modal-actions .btn-save {
      padding: 0.5rem 1.2rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
      border: none; background: var(--accent); color: #fff; cursor: pointer;
    }
    .modal-actions .btn-cancel {
      padding: 0.5rem 1.2rem; border-radius: 8px; font-size: 0.9rem;
      border: 1px solid var(--border); background: var(--bg); cursor: pointer; color: var(--text);
    }

    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }

    /* View toggle */
    .view-toggle {
      display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
      margin-bottom: 1rem;
    }
    .view-toggle button {
      padding: 0.4rem 1rem; font-size: 0.85rem; font-weight: 600; border: none;
      background: var(--bg-card); color: var(--text-muted); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-toggle button + button { border-left: 1px solid var(--border); }
    .view-toggle button.active { background: var(--accent); color: #fff; }

    /* Inquiry cards */
    .inquiry-grid {
      display: grid; grid-template-columns: 1fr; gap: 0.75rem;
    }
    .inquiry-card {
      display: flex; gap: 0.75rem; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem; transition: box-shadow 0.15s;
    }
    .inquiry-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .inquiry-thumb {
      width: 80px; height: 80px; border-radius: 8px; overflow: hidden; flex-shrink: 0;
      background: #f3f4f6; cursor: pointer;
    }
    .inquiry-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .inquiry-body { flex: 1; min-width: 0; }
    .inquiry-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .inquiry-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .inquiry-type-badge {
      display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    }
    .inquiry-type-badge.general { background: #eff6ff; color: #2563eb; }
    .inquiry-type-badge.color_pick { background: #fef3c7; color: #92400e; }
    .inquiry-status {
      display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px;
      font-size: 0.65rem; font-weight: 700;
    }
    .inquiry-status.pending { background: #fef3c7; color: #92400e; }
    .inquiry-status.processing { background: #dbeafe; color: #1e40af; }
    .inquiry-status.completed { background: #d1fae5; color: #065f46; }
    .inquiry-status.failed { background: #fef2f2; color: #991b1b; }
    .inquiry-answer {
      margin-top: 0.5rem; font-size: 0.8rem; color: var(--text);
      background: #f9fafb; border-radius: 6px; padding: 0.5rem; line-height: 1.4;
      white-space: pre-wrap;
    }
    .inquiry-colors { display: flex; gap: 4px; margin-top: 0.4rem; }
    .inquiry-swatch {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    /* Inquiry toolbar */
    .inquiry-toolbar {
      display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
    }
    .inquiry-toolbar select {
      padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.85rem; background: var(--bg-card);
    }

    /* Photo thumbs in modal */
    .admin-photo-thumb {
      position: relative; width: 64px; height: 64px; border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border); cursor: pointer; display: inline-block;
    }
    .admin-photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .admin-photo-thumb .photo-remove {
      position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
      background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%;
      font-size: 0.65rem; cursor: pointer; display: flex; align-items: center;
      justify-content: center; line-height: 1;
    }

    @media (max-width: 768px) {
      .task-table th.hide-mobile, .task-table td.hide-mobile { display: none; }
    }
  </style>
  <link rel="stylesheet" href="../../styles/site.css">

</head>
<body>
  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-overlay__logo">
      <img src="https://aphrrfprbixmhissnjfn.supabase.co/storage/v1/object/public/housephotos/logos/sponic-logo-dark.png" alt="" class="loading-overlay__icon" width="28" height="40" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 21 30%22%3E%3Cpath d=%22M10.5 1.5C8.3 1.5 6.5 3.3 6.5 5.5v4.1L3.8 13c-1 1.3-1.5 2.8-1.5 4.4 0 4.6 3.7 8.3 8.2 8.3s8.2-3.7 8.2-8.3c0-1.6-.5-3.2-1.5-4.4l-2.7-3.4V5.5c0-2.2-1.8-4-4-4z%22 fill=%22%231f1720%22/%3E%3Cellipse cx=%2210.5%22 cy=%2218.6%22 rx=%223.1%22 ry=%224.7%22 fill=%22%23f6f5f0%22/%3E%3C/svg%3E'">
      <img src="https://aphrrfprbixmhissnjfn.supabase.co/storage/v1/object/public/housephotos/logos/wordmark-black-transparent.png" alt="Sponic Garden" class="loading-overlay__wordmark" width="28" height="28" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 28%22%3E%3Ctext x=%220%22 y=%2220%22 font-size=%2216%22 font-family=%22Arial,sans-serif%22 fill=%22%231f1720%22%3EAlpaca%3C/text%3E%3C/svg%3E'">
    </div>
    <div class="spinner spinner--sm"></div>
  </div>

  <!-- Access denied (populated by JS) -->
  <div id="unauthorizedOverlay" class="loading-overlay hidden"></div>

  <!-- Main app content -->
  <div id="appContent" class="hidden">
    <div id="siteHeader"></div>

    <span data-site-version style="display:none">v260322.27 11:46p</span>

    <div class="context-switcher hidden" id="contextSwitcher">
      <a href="/members/" class="context-switcher-btn">Member</a>
      <a class="context-switcher-btn active">Staff</a>
    </div>

    <!-- Tab Navigation -->
    <div class="manage-tabs" id="tabNav"></div>

    <!-- Main Content -->
    <main class="manage-content projects-page">
      <!-- View Toggle -->
      <div class="view-toggle" id="viewToggle">
        <button class="active" data-view="tasks">Tasks</button>
        <button data-view="inquiries">Inquiries</button>
      </div>

      <!-- ===== TASKS VIEW ===== -->
      <div id="tasksView">
      <!-- Summary -->
      <div class="summary-cards" id="summaryCards">
        <div class="summary-card"><div class="num" id="statTotal">0</div><div class="label">Total</div></div>
        <div class="summary-card open"><div class="num" id="statOpen">0</div><div class="label">Open</div></div>
        <div class="summary-card in-progress"><div class="num" id="statInProgress">0</div><div class="label">In Progress</div></div>
        <div class="summary-card on-hold"><div class="num" id="statOnHold">0</div><div class="label">On Hold</div></div>
        <div class="summary-card done"><div class="num" id="statDone">0</div><div class="label">Done</div></div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search tasks...">
        <select id="filterAssignee"><option value="">All People</option></select>
        <select id="filterStatus">
          <option value="">Active (not Done)</option>
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="on_hold">On Hold</option>
          <option value="done">Done</option>
          <option value="all">All</option>
        </select>
        <select id="filterPriority">
          <option value="">All Priorities</option>
          <option value="1">P1</option>
          <option value="2">P2</option>
          <option value="3">P3</option>
          <option value="4">P4</option>
        </select>
        <button class="btn-add" id="btnAddTask">+ Add Task</button>
      </div>

      <!-- Bulk actions -->
      <div class="bulk-bar" id="bulkBar">
        <span id="bulkCount">0</span> selected
        <select id="bulkAssignee"><option value="">Reassign to...</option></select>
        <button id="btnBulkReassign">Reassign</button>
        <select id="bulkStatus">
          <option value="">Change status...</option>
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="on_hold">On Hold</option>
          <option value="done">Done</option>
        </select>
        <button id="btnBulkStatus">Apply</button>
      </div>

      <!-- Table -->
      <div style="overflow-x:auto">
        <table class="task-table">
          <thead>
            <tr>
              <th style="width:30px"><input type="checkbox" id="selectAll"></th>
              <th style="width:30px">#</th>
              <th style="width:40px">P</th>
              <th>Task</th>
              <th>Assignee</th>
              <th>Location</th>
              <th>Status</th>
              <th class="hide-mobile" style="width:80px">Actions</th>
            </tr>
          </thead>
          <tbody id="taskTableBody">
            <tr><td colspan="8" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      </div><!-- /tasksView -->

      <!-- ===== INQUIRIES VIEW ===== -->
      <div id="inquiriesView" style="display:none">
        <div class="inquiry-toolbar">
          <select id="inquiryFilterStatus">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
          </select>
          <select id="inquiryFilterType">
            <option value="">All Types</option>
            <option value="color_pick">Color Pick</option>
            <option value="general">General</option>
          </select>
        </div>
        <div class="inquiry-grid" id="inquiryGrid">
          <div class="empty-state">Loading inquiries...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal-box">
      <h3 id="modalTitle">Add Task</h3>
      <input type="hidden" id="editTaskId">

      <label>Title *</label>
      <input type="text" id="inputTitle" required>

      <label>Notes</label>
      <textarea id="inputNotes"></textarea>

      <label>Description</label>
      <textarea id="inputDescription" placeholder="Detailed description..." style="min-height:80px"></textarea>

      <label>Priority</label>
      <select id="inputPriority">
        <option value="">None</option>
        <option value="1">P1 - Urgent</option>
        <option value="2">P2 - High</option>
        <option value="3">P3 - Medium</option>
        <option value="4">P4 - Low</option>
      </select>

      <label>Location</label>
      <select id="inputSpace">
        <option value="">None</option>
      </select>

      <label>Location Note</label>
      <input type="text" id="inputLocationLabel" placeholder="e.g. Electronics, Attic...">

      <label>Assigned To</label>
      <select id="inputAssignee">
        <option value="">Unassigned</option>
      </select>

      <label>Status</label>
      <select id="inputStatus">
        <option value="open">Open</option>
        <option value="in_progress">In Progress</option>
        <option value="on_hold">On Hold</option>
        <option value="done">Done</option>
      </select>

      <label>Photos</label>
      <div id="adminTaskPhotos" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem"></div>
      <label class="btn-upload-photo" for="adminPhotoInput" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.75rem;border:1px dashed var(--border);border-radius:6px;font-size:0.8rem;color:var(--text-muted);cursor:pointer;margin-bottom:0.75rem">
        <span>+ Add Photo</span>
      </label>
      <input type="file" id="adminPhotoInput" accept="image/*" style="display:none" multiple>

      <div class="modal-actions">
        <button class="btn-cancel" id="btnModalCancel">Cancel</button>
        <button class="btn-save" id="btnModalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Instant chrome: skip spinner + pre-render header for returning users -->
  <script src="../../shared/instant-chrome.js"></script>

  <script src="/vendor/supabase-js-2.39.3.min.js"></script>
  <script type="module" src="../../shared/version-info.js"></script>
  <script type="module" src="projects.js"></script>
</body>
</html>

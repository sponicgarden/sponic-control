<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Purchases & Receipts - AlpacAPPs Admin</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="apple-touch-icon" href="../../apple-touch-icon.png">
  <script>try{var c=localStorage.getItem("sponic-cached-auth");if(c&&JSON.parse(c).appUser)document.documentElement.dataset.cachedAuth="1"}catch(e){}</script>
  <style>.hidden{display:none!important}[data-cached-auth] #loadingOverlay{opacity:0!important;pointer-events:none!important;visibility:hidden!important}[data-cached-auth] #appContent.hidden{display:block!important}#loadingOverlay{position:fixed;inset:0;background:#f6f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .16s ease-out}.loading-overlay__logo{display:flex;align-items:center;gap:.75rem;min-height:40px}.loading-overlay__icon{height:40px;width:auto;max-width:none}.loading-overlay__wordmark{height:28px;width:auto;max-width:none}</style>
  <link rel="stylesheet" href="../styles.css?v=5">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="manage-shared.css?v=5">
  <link rel="stylesheet" href="../../styles/site.css">
  <link rel="stylesheet" href="../../styles/tailwind.out.css">
  <style>
    .purchases-grid {
      display: grid;
      gap: 1rem;
      margin-top: 1rem;
    }

    .purchase-card {
      background: white;
      border: 1px solid var(--border-color, #e5e7eb);
      border-radius: 8px;
      padding: 1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      transition: box-shadow 0.2s;
    }

    .purchase-card:hover {
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .purchase-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 0.5rem;
    }

    .vendor-name {
      font-weight: 600;
      font-size: 1.125rem;
      color: #1f2937;
    }

    a.vendor-name:hover {
      text-decoration: underline;
    }

    .purchase-amount {
      font-size: 1.25rem;
      font-weight: 700;
      color: #059669;
    }

    .purchase-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.875rem;
      color: var(--text-muted, #6b7280);
      margin-bottom: 0.5rem;
    }

    .purchase-meta > span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .category-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
      background: #e0e7ff;
      color: #4338ca;
    }

    .items-list {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border-color, #e5e7eb);
    }

    .items-list h4 {
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .item {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      color: var(--text-muted, #6b7280);
      padding: 0.25rem 0;
    }

    .receipt-thumbnail {
      width: 120px;
      height: 160px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border-color, #e5e7eb);
      cursor: pointer;
    }

    .receipt-thumbnail:hover {
      opacity: 0.8;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border: 1px solid var(--border-color, #e5e7eb);
      border-radius: 8px;
      padding: 1rem;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-muted, #6b7280);
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f2937;
    }

    .vendors-section {
      margin-top: 3rem;
    }

    .vendor-list {
      display: grid;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .vendor-item {
      background: white;
      border: 1px solid var(--border-color, #e5e7eb);
      border-radius: 6px;
      padding: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .vendor-info h4 {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 0.25rem;
    }

    .vendor-contact {
      font-size: 0.875rem;
      color: var(--text-muted, #6b7280);
    }

    .vendor-stats {
      text-align: right;
      font-size: 0.875rem;
    }

    .vendor-total {
      font-weight: 700;
      color: #059669;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-overlay__logo">
      <img src="https://aphrrfprbixmhissnjfn.supabase.co/storage/v1/object/public/housephotos/logos/sponic-logo-dark.png" alt="" class="loading-overlay__icon" width="28" height="40" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 21 30%22%3E%3Cpath d=%22M10.5 1.5C8.3 1.5 6.5 3.3 6.5 5.5v4.1L3.8 13c-1 1.3-1.5 2.8-1.5 4.4 0 4.6 3.7 8.3 8.2 8.3s8.2-3.7 8.2-8.3c0-1.6-.5-3.2-1.5-4.4l-2.7-3.4V5.5c0-2.2-1.8-4-4-4z%22 fill=%22%231f1720%22/%3E%3Cellipse cx=%2210.5%22 cy=%2218.6%22 rx=%223.1%22 ry=%224.7%22 fill=%22%23f6f5f0%22/%3E%3C/svg%3E'">
      <img src="https://aphrrfprbixmhissnjfn.supabase.co/storage/v1/object/public/housephotos/logos/wordmark-black-transparent.png" alt="Sponic Garden" class="loading-overlay__wordmark" width="28" height="28" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 28%22%3E%3Ctext x=%220%22 y=%2220%22 font-size=%2216%22 font-family=%22Arial,sans-serif%22 fill=%22%231f1720%22%3EAlpaca%3C/text%3E%3C/svg%3E'">
    </div>
    <div class="spinner spinner--sm"></div>
  </div>

  <!-- Access denied (populated by JS) -->
  <div id="unauthorizedOverlay" class="loading-overlay hidden"></div>

  <!-- Main app content -->
  <div id="appContent" class="hidden">
    <div id="siteHeader"></div>

    <span data-site-version style="display:none">v260322.27 11:46p</span>

    <div class="context-switcher hidden" id="contextSwitcher">
      <a href="/residents/" class="context-switcher-btn">Resident</a>
      <a class="context-switcher-btn active">Staff</a>
    </div>

    <!-- Tab Navigation -->
    <div class="manage-tabs" id="tabNav"></div>

    <!-- Main Content -->
    <main class="manage-content">
      <div style="max-width: 1200px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <div>
            <h2 style="margin: 0;">Purchases & Receipts</h2>
            <p style="margin: 0.25rem 0 0; color: var(--text-muted);">Track property purchases and vendor receipts</p>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Spent</div>
            <div class="stat-value" id="totalSpent">$0.00</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Purchases</div>
            <div class="stat-value" id="purchaseCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Average Purchase</div>
            <div class="stat-value" id="avgPurchase">$0.00</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Date Range</div>
            <div class="stat-value" style="font-size: 1rem;" id="dateRange">N/A</div>
          </div>
        </div>

        <div style="background: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem;">
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; align-items: end;">
            <div>
              <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem;">Vendor</label>
              <input type="text" id="vendorFilter" placeholder="Filter by vendor..." style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
            </div>
            <div>
              <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem;">Category</label>
              <select id="categoryFilter" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
                <option value="">All Categories</option>
                <option value="grocery">Grocery</option>
                <option value="hardware">Hardware</option>
                <option value="utilities">Utilities</option>
                <option value="services">Services</option>
                <option value="dining">Dining</option>
                <option value="retail">Retail</option>
                <option value="automotive">Automotive</option>
                <option value="healthcare">Healthcare</option>
                <option value="supplies">Supplies</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div>
              <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem;">From</label>
              <input type="date" id="minDate" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
            </div>
            <div>
              <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem;">To</label>
              <input type="date" id="maxDate" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
            </div>
            <div>
              <button id="resetFiltersBtn" class="btn-small btn-secondary" style="width: 100%;">Reset Filters</button>
            </div>
          </div>
        </div>

        <div class="purchases-grid" id="purchasesGrid">
          <p style="color: var(--text-muted); text-align: center; padding: 2rem;">Loading purchases...</p>
        </div>

        <div class="vendors-section">
          <h3 style="margin-bottom: 1rem;">Vendors</h3>
          <div class="vendor-list" id="vendorsList">
            <p style="color: var(--text-muted); text-align: center; padding: 2rem;">Loading vendors...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Instant chrome: skip spinner + pre-render header for returning users -->
  <script src="../../shared/instant-chrome.js"></script>

  <script type="module" src="../../shared/version-info.js"></script>
  <script src="/vendor/supabase-js-2.39.3.min.js"></script>
  <script type="module" src="purchases.js"></script>
</body>
</html>

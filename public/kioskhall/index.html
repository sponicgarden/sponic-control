<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Sponic Garden - Welcome</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="stylesheet" href="kiosk.css">
  <script type="module" src="../shared/version-info.js"></script>
</head>
<body>
  <div class="kiosk-container">
    <!-- Header -->
    <header class="kiosk-header">
      <div class="kiosk-brand">
        <img src="https://aphrrfprbixmhissnjfn.supabase.co/storage/v1/object/public/housephotos/logos/sponic-logo-light.png"
             alt="" class="kiosk-logo">
        <img src="https://aphrrfprbixmhissnjfn.supabase.co/storage/v1/object/public/housephotos/logos/wordmark-white-transparent.png"
             alt="Sponic Garden Warsaw" class="kiosk-wordmark">
      </div>
      <div class="kiosk-datetime" id="datetime"></div>
    </header>

    <!-- Main content: two-column in landscape -->
    <div class="kiosk-main">
      <!-- Left column -->
      <div class="kiosk-col kiosk-col-left">
        <!-- Guestbook -->
        <section class="kiosk-section kiosk-guestbook-section" id="guestbookSection">
          <h2 class="kiosk-section-title">Guestbook</h2>
          <!-- Text input -->
          <div class="guestbook-input">
            <input type="text" id="guestName" placeholder="Your name" class="guestbook-field" maxlength="50">
            <textarea id="guestMessage" placeholder="Leave a message for the house..." class="guestbook-field guestbook-textarea" maxlength="280"></textarea>
            <button id="guestSubmit" class="guestbook-btn">Sign</button>
          </div>
          <!-- Media record buttons -->
          <div class="guestbook-media-bar">
            <button id="recordVideoBtn" class="guestbook-media-btn" title="Record a video message">
              <span class="media-icon">&#9654;</span> Video
            </button>
            <button id="recordAudioBtn" class="guestbook-media-btn" title="Record an audio message">
              <span class="media-icon">&#9835;</span> Audio
            </button>
            <span class="guestbook-email-hint">or email <strong>guestbook@sponicgarden.com</strong></span>
          </div>
          <!-- Recording UI (hidden by default) -->
          <div class="guestbook-recorder" id="recorderUI" style="display:none">
            <video id="recorderPreview" class="recorder-preview" autoplay muted playsinline></video>
            <div class="recorder-controls">
              <span class="recorder-timer" id="recorderTimer">0:00</span>
              <button id="recorderStartStop" class="guestbook-btn recorder-btn">Start Recording</button>
              <button id="recorderCancel" class="guestbook-btn recorder-btn-cancel">Cancel</button>
            </div>
          </div>
          <!-- Upload progress -->
          <div class="guestbook-upload" id="uploadUI" style="display:none">
            <div class="upload-bar"><div class="upload-bar-fill" id="uploadFill"></div></div>
            <span class="upload-label" id="uploadLabel">Uploading...</span>
          </div>
          <!-- Entries -->
          <div class="guestbook-entries" id="guestbookEntries">
            <div class="kiosk-loading">Loading...</div>
          </div>
        </section>
      </div>

      <!-- Right column -->
      <div class="kiosk-col kiosk-col-right">
        <!-- Current Herd -->
        <section class="kiosk-section" id="occupantsSection">
          <h2 class="kiosk-section-title">Current Herd</h2>
          <div class="kiosk-occupants" id="occupantsGrid">
            <div class="kiosk-loading">Loading...</div>
          </div>
        </section>

        <!-- Upcoming Events -->
        <section class="kiosk-section" id="eventsSection" style="display:none">
          <h2 class="kiosk-section-title">Upcoming</h2>
          <div class="kiosk-events" id="eventsList"></div>
        </section>

        <!-- Alpaca Fact of the Moment -->
        <section class="kiosk-section kiosk-fact-section" id="factSection">
          <div class="fact-label">Alpaca Fact of the Moment</div>
          <p class="fact-text" id="factText">Loading...</p>
        </section>

        <!-- Network Status (bottom-right corner) -->
        <a href="https://192.168.1.1" target="_blank" class="kiosk-network-link" id="networkLink">
          <span class="net-icon">&#9678;</span>
          <div class="net-info">
            <span class="net-title">Network</span>
            <span class="net-subtitle" id="netSubtitle">Tap to open UniFi</span>
          </div>
        </a>
      </div>
    </div>

    <!-- Footer -->
    <footer class="kiosk-footer">
      <span class="kiosk-pai-count" id="paiCount"></span>
      <span class="kiosk-version"></span>
    </footer>
  </div>

  <!-- Art Screensaver Overlay -->
  <div class="art-screensaver" id="artScreensaver" style="display:none">
    <img class="art-screensaver-img" id="artImage" alt="">
    <div class="art-screensaver-caption" id="artCaption"></div>
  </div>

  <script src="/vendor/supabase-js-2.39.3.min.js"></script>
  <script type="module" src="kiosk.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
    <marker id="ax" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">FIG. 4 — QR Companion Interface Sequence Diagram (500)</text>

  <!-- Actors -->
  <rect x="30" y="55" width="100" height="35" rx="6" fill="#e8f0fe" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="77" text-anchor="middle" font-size="11" font-weight="bold">USER</text>
  <line x1="80" y1="90" x2="80" y2="560" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="195" y="55" width="120" height="35" rx="6" fill="#fef3c7" stroke="#333" stroke-width="1.5"/>
  <text x="255" y="77" text-anchor="middle" font-size="11" font-weight="bold">QR CODE (510)</text>
  <line x1="255" y1="90" x2="255" y2="560" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="380" y="55" width="140" height="35" rx="6" fill="#fff7ed" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="77" text-anchor="middle" font-size="11" font-weight="bold">WEB APP (530)</text>
  <line x1="450" y1="90" x2="450" y2="560" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="580" y="55" width="140" height="35" rx="6" fill="#ede9fe" stroke="#333" stroke-width="1.5"/>
  <text x="650" y="72" text-anchor="middle" font-size="10" font-weight="bold">LOCATION</text>
  <text x="650" y="84" text-anchor="middle" font-size="10" font-weight="bold">GATE (520)</text>
  <line x1="650" y1="90" x2="650" y2="560" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step 1: QR displayed -->
  <rect x="170" y="110" width="170" height="35" rx="4" fill="#fef9c3" stroke="#b45309" stroke-width="1"/>
  <text x="255" y="132" text-anchor="middle" font-size="10" fill="#333">QR code displayed on wall/table</text>
  <text x="255" y="105" text-anchor="middle" font-size="9" fill="#b45309" font-weight="bold">1</text>

  <!-- Step 2: User scans -->
  <line x1="80" y1="165" x2="243" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="160" y="158" text-anchor="middle" font-size="10" fill="#333">Scan with phone camera</text>
  <text x="80" y="158" font-size="9" fill="#b45309" font-weight="bold">2</text>

  <!-- Step 3: Open URL -->
  <line x1="255" y1="195" x2="438" y2="195" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="345" y="188" text-anchor="middle" font-size="10" fill="#333">Open URL (no app install)</text>
  <text x="255" y="188" font-size="9" fill="#b45309" font-weight="bold">3</text>

  <!-- Step 4: Request geolocation -->
  <line x1="450" y1="225" x2="638" y2="225" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="545" y="218" text-anchor="middle" font-size="10" fill="#333">Request device geolocation</text>
  <text x="450" y="218" font-size="9" fill="#b45309" font-weight="bold">4</text>

  <!-- Step 5: Verify location -->
  <rect x="590" y="245" width="120" height="45" rx="4" fill="#ede9fe" stroke="#333" stroke-width="1"/>
  <text x="650" y="263" text-anchor="middle" font-size="10" fill="#333">Compare device</text>
  <text x="650" y="277" text-anchor="middle" font-size="10" fill="#333">coords to venue</text>
  <text x="650" y="240" font-size="9" fill="#b45309" font-weight="bold">5</text>

  <!-- Decision: match? -->
  <!-- YES path -->
  <line x1="650" y1="290" x2="650" y2="315" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="595" y="315" width="110" height="25" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="650" y="332" text-anchor="middle" font-size="10" font-weight="bold" fill="#16a34a">MATCH ✓</text>

  <!-- NO path (rejection) -->
  <line x1="710" y1="268" x2="760" y2="268" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="710" y="248" width="80" height="40" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="750" y="266" text-anchor="middle" font-size="9" font-weight="bold" fill="#dc2626">NO MATCH</text>
  <text x="750" y="278" text-anchor="middle" font-size="9" fill="#dc2626">→ Access denied</text>

  <!-- Step 6: Grant access -->
  <line x1="638" y1="340" x2="462" y2="340" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="545" y="355" text-anchor="middle" font-size="10" fill="#16a34a">Grant access to controls</text>
  <text x="638" y="355" font-size="9" fill="#b45309" font-weight="bold">6</text>

  <!-- Step 7: Show UI -->
  <line x1="438" y1="380" x2="92" y2="380" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="260" y="373" text-anchor="middle" font-size="10" fill="#333">Display control interface</text>
  <text x="438" y="373" font-size="9" fill="#b45309" font-weight="bold">7</text>

  <!-- UI mockup box -->
  <rect x="35" y="400" width="200" height="130" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="135" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Now Playing: Track Name</text>
  <line x1="55" y1="428" x2="215" y2="428" stroke="#eee" stroke-width="1"/>
  <text x="135" y="445" text-anchor="middle" font-size="9" fill="#666">♫ Artist — Album</text>
  <rect x="55" y="455" width="70" height="25" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="90" y="472" text-anchor="middle" font-size="9" fill="#16a34a">👍 Like</text>
  <rect x="135" y="455" width="70" height="25" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="170" y="472" text-anchor="middle" font-size="9" fill="#dc2626">👎 Skip</text>
  <rect x="55" y="490" width="150" height="25" rx="4" fill="#e8f0fe" stroke="#333" stroke-width="1"/>
  <text x="130" y="507" text-anchor="middle" font-size="9" fill="#333">🔊 Volume ████░░ </text>

  <!-- Step 8: User sends feedback -->
  <line x1="80" y1="545" x2="438" y2="545" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="260" y="538" text-anchor="middle" font-size="10" fill="#333">Send feedback / control input → Audio Engine (300)</text>
  <text x="80" y="538" font-size="9" fill="#b45309" font-weight="bold">8</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Arial, Helvetica, sans-serif">
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">FIG. 3 — Gesture Vocabulary Reference (250)</text>

  <!-- Column headers -->
  <text x="135" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">GESTURE</text>
  <text x="400" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">DESCRIPTION</text>
  <text x="665" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">ACTION</text>
  <line x1="30" y1="75" x2="770" y2="75" stroke="#ccc" stroke-width="1"/>

  <!-- Gesture 1: Wave / Swipe Right -->
  <rect x="50" y="90" width="170" height="60" rx="8" fill="#e8f0fe" stroke="#333" stroke-width="1"/>
  <text x="135" y="115" text-anchor="middle" font-size="24">👋</text>
  <text x="135" y="140" text-anchor="middle" font-size="10" fill="#555">Open palm, swipe right</text>
  <rect x="280" y="100" width="240" height="40" rx="6" fill="#f9fafb" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="118" text-anchor="middle" font-size="10" fill="#333">Hand wave or horizontal swipe</text>
  <text x="400" y="132" text-anchor="middle" font-size="10" fill="#333">detected by pose estimation (251)</text>
  <rect x="570" y="100" width="190" height="40" rx="6" fill="#d1fae5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="665" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">SKIP TRACK →</text>

  <!-- Gesture 2: Thumbs Up -->
  <rect x="50" y="165" width="170" height="60" rx="8" fill="#dcfce7" stroke="#333" stroke-width="1"/>
  <text x="135" y="190" text-anchor="middle" font-size="24">👍</text>
  <text x="135" y="215" text-anchor="middle" font-size="10" fill="#555">Closed fist, thumb extended up</text>
  <rect x="280" y="175" width="240" height="40" rx="6" fill="#f9fafb" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="193" text-anchor="middle" font-size="10" fill="#333">Thumb up detected via hand</text>
  <text x="400" y="207" text-anchor="middle" font-size="10" fill="#333">landmark analysis (252)</text>
  <rect x="570" y="175" width="190" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="665" y="199" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">LIKE (positive reward)</text>

  <!-- Gesture 3: Thumbs Down -->
  <rect x="50" y="240" width="170" height="60" rx="8" fill="#fee2e2" stroke="#333" stroke-width="1"/>
  <text x="135" y="265" text-anchor="middle" font-size="24">👎</text>
  <text x="135" y="290" text-anchor="middle" font-size="10" fill="#555">Closed fist, thumb extended down</text>
  <rect x="280" y="250" width="240" height="40" rx="6" fill="#f9fafb" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="268" text-anchor="middle" font-size="10" fill="#333">Thumb down detected via hand</text>
  <text x="400" y="282" text-anchor="middle" font-size="10" fill="#333">landmark analysis (253)</text>
  <rect x="570" y="250" width="190" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="665" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">DISLIKE (negative reward)</text>

  <!-- Gesture 4: Palm Up (raise) -->
  <rect x="50" y="315" width="170" height="60" rx="8" fill="#fef3c7" stroke="#333" stroke-width="1"/>
  <text x="135" y="340" text-anchor="middle" font-size="24">🤚⬆</text>
  <text x="135" y="365" text-anchor="middle" font-size="10" fill="#555">Open palm, raise upward</text>
  <rect x="280" y="325" width="240" height="40" rx="6" fill="#f9fafb" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="343" text-anchor="middle" font-size="10" fill="#333">Upward palm movement tracked</text>
  <text x="400" y="357" text-anchor="middle" font-size="10" fill="#333">over 0.5s window (254)</text>
  <rect x="570" y="325" width="190" height="40" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="665" y="349" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">VOLUME UP 🔊</text>

  <!-- Gesture 5: Palm Down (lower) -->
  <rect x="50" y="390" width="170" height="60" rx="8" fill="#fef3c7" stroke="#333" stroke-width="1"/>
  <text x="135" y="415" text-anchor="middle" font-size="24">🤚⬇</text>
  <text x="135" y="440" text-anchor="middle" font-size="10" fill="#555">Open palm, push downward</text>
  <rect x="280" y="400" width="240" height="40" rx="6" fill="#f9fafb" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="418" text-anchor="middle" font-size="10" fill="#333">Downward palm movement tracked</text>
  <text x="400" y="432" text-anchor="middle" font-size="10" fill="#333">over 0.5s window (255)</text>
  <rect x="570" y="400" width="190" height="40" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="665" y="424" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">VOLUME DOWN 🔉</text>

  <!-- Note -->
  <rect x="30" y="470" width="740" height="40" rx="6" fill="#f9fafb" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="488" text-anchor="middle" font-size="10" fill="#666">Conflict resolution: When multiple persons gesture simultaneously, the system uses majority voting (256).</text>
  <text x="400" y="502" text-anchor="middle" font-size="10" fill="#666">Gestures require sustained hold (≥0.5s) to prevent false positives from casual hand movements.</text>
</svg>
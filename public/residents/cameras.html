      <section class="section" id="sensorsSection" style="display: none;">
        <div class="section-header">
          <h2>Environment Sensors</h2>
        </div>
        <div class="section-body">
          <div class="sensor-grid" id="sensorGrid">
            <!-- Rendered by JS -->
          </div>
          <div class="poll-status" id="sensorPollStatus"></div>
        </div>
      </section>

      <!-- Recent Events Section — UniFi-style filmstrip -->
      <section class="section evt-section" id="eventsSection" style="display: none;">

          </div>
          <img class="evt-preview__img hidden" id="evtPreviewImg" alt="Event preview">
          <div class="evt-preview__meta hidden" id="evtPreviewMeta"></div>
          <button class="evt-preview__play hidden" id="evtPreviewPlay" title="Play clip">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>

        </div>
        <div class="evt-preview__divider"></div>

              <span id="eventDateLabel">Date</span>
            </button>
            <button class="evt-date-clear hidden" id="eventDateClear" onclick="window.__clearEventDateFilter()" title="Clear date">&times;</button>
          </div>
          <div class="evt-filters__sep"></div>
          <div class="evt-filters__types" id="evtTypeFilters">
            <button class="evt-type-btn active" data-type="all" title="All">All</button>
            <button class="evt-type-btn" data-type="person" title="Person"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21v-2a6.5 6.5 0 0113 0v2"/></svg></button>

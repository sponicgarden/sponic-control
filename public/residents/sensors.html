  <style>
    /* ===== SENSOR DASHBOARD ===== */
    .sensors-page { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
    .sensors-page .section-header { display: none !important; }

    .sdash {
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 40%, #0f172a 100%);
      color: #e2e8f0;
      padding: 1.25rem;
      padding-bottom: calc(2rem + env(safe-area-inset-bottom, 0px));
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      min-height: calc(100vh - 120px);
      min-height: calc(100dvh - 120px);
    }
    .sdash__inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* --- Header --- */
    .sdash__head {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0;
    }
    .sdash__dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .sdash__dot--live { background: #22c55e; box-shadow: 0 0 8px #22c55e88; animation: pulse-dot 2s ease-in-out infinite; }
    .sdash__dot--off  { background: #f59e0b; box-shadow: 0 0 6px #f59e0b66; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .sdash__name { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.02em; }
    .sdash__loc  { font-size: 0.8rem; color: #94a3b8; }
    .sdash__conn-badge {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0.2rem 0.6rem; border-radius: 99px;
    }
    .sdash__conn-badge--live { background: rgba(34,197,94,0.15); color: #4ade80; }
    .sdash__conn-badge--off  { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .sdash__batt {
      margin-left: auto;
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.85rem; font-weight: 600;
    }
    .sdash__batt svg { width: 22px; height: 22px; }
    .sdash__batt--ok  { color: #22c55e; }
    .sdash__batt--low { color: #f59e0b; }

    /* --- Top Row: Temp hero + gauge pair --- */
    .sdash__top {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    /* --- Temperature Hero --- */
    .sdash__temp-hero {
      background: linear-gradient(135deg, #1e3a5f 0%, #0c4a6e 50%, #164e63 100%);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .sdash__temp-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 120%, rgba(251,191,36,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .sdash__temp-label {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em;
      color: #94a3b8; margin-bottom: 0.5rem;
    }
    .sdash__temp-val {
      font-size: 6rem; font-weight: 800; line-height: 1;
      background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 40%, #d97706 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative; z-index: 1;
    }
    .sdash__temp-unit {
      font-size: 2rem; font-weight: 400; opacity: 0.7;
      -webkit-text-fill-color: #fbbf24;
    }
    .sdash__temp-status {
      font-size: 0.9rem; margin-top: 0.5rem;
      position: relative; z-index: 1;
    }

    /* --- Gauge Cards --- */
    .sdash__gauges {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .sdash__gauge {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 1.5rem 1rem 1.25rem;
      text-align: center;
    }
    .sdash__gauge svg { display: block; margin: 0 auto 0.75rem; }
    .sdash__gauge-label {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em;
      color: #64748b; margin-bottom: 0.75rem;
    }
    .sdash__gauge-val {
      font-size: 2.5rem; font-weight: 800; line-height: 1;
    }
    .sdash__gauge-unit {
      font-size: 0.9rem; font-weight: 400; opacity: 0.6;
    }
    .sdash__gauge-sub {
      font-size: 0.7rem; color: #64748b; margin-top: 0.25rem;
    }

    /* --- Status Tiles --- */
    .sdash__statuses {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .sdash__status {
      border-radius: 20px;
      padding: 1.5rem;
      text-align: center;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }
    .sdash__status-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 0.75rem;
    }
    .sdash__status-icon svg { width: 28px; height: 28px; }
    .sdash__status-label {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em;
      opacity: 0.7; margin-bottom: 0.25rem;
    }
    .sdash__status-val {
      font-size: 1.5rem; font-weight: 800; letter-spacing: 0.03em;
    }
    .sdash__status-time {
      font-size: 0.7rem; opacity: 0.5; margin-top: 0.4rem;
    }

    /* Door closed */
    .sdash__status--closed {
      background: linear-gradient(135deg, rgba(34,197,94,0.1) 0%, rgba(34,197,94,0.05) 100%);
      border-color: rgba(34,197,94,0.2);
    }
    .sdash__status--closed .sdash__status-icon { background: rgba(34,197,94,0.15); color: #22c55e; }
    .sdash__status--closed .sdash__status-val { color: #4ade80; }
    /* Door open */
    .sdash__status--open {
      background: linear-gradient(135deg, rgba(239,68,68,0.15) 0%, rgba(239,68,68,0.05) 100%);
      border-color: rgba(239,68,68,0.3);
      animation: pulse-tile 1.5s ease-in-out infinite;
    }
    .sdash__status--open .sdash__status-icon { background: rgba(239,68,68,0.2); color: #ef4444; }
    .sdash__status--open .sdash__status-val { color: #f87171; }
    /* Motion active */
    .sdash__status--motion {
      background: linear-gradient(135deg, rgba(168,85,247,0.15) 0%, rgba(168,85,247,0.05) 100%);
      border-color: rgba(168,85,247,0.3);
      animation: pulse-tile 2s ease-in-out infinite;
    }
    .sdash__status--motion .sdash__status-icon { background: rgba(168,85,247,0.2); color: #a855f7; }
    .sdash__status--motion .sdash__status-val { color: #c084fc; }
    /* Motion clear */
    .sdash__status--clear {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.06);
    }
    .sdash__status--clear .sdash__status-icon { background: rgba(255,255,255,0.06); color: #64748b; }
    .sdash__status--clear .sdash__status-val { color: #94a3b8; }

    @keyframes pulse-tile { 0%,100% { opacity: 1; } 50% { opacity: 0.85; } }

    /* --- Alarm Banner --- */
    .sdash__alarm {
      background: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%);
      border-radius: 16px;
      padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.75rem;
      font-weight: 700; font-size: 0.9rem;
      animation: flash-alarm 0.8s ease-in-out infinite;
    }
    .sdash__alarm svg { width: 24px; height: 24px; flex-shrink: 0; }
    @keyframes flash-alarm { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* --- Footer Info --- */
    .sdash__footer {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 1.5rem;
      font-size: 0.7rem;
      color: #475569;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      margin-top: 0.5rem;
    }
    .sdash__footer span { white-space: nowrap; }

    /* --- Empty state --- */
    .sdash-empty {
      min-height: calc(100vh - 120px);
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 40%, #0f172a 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #64748b; padding: 3rem 1rem; text-align: center;
    }
    .sdash-empty svg { opacity: 0.2; margin-bottom: 1.5rem; }
    .sdash-empty p:first-of-type { font-size: 1.1rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.5rem; }
    .sdash-empty p:last-of-type { max-width: 320px; line-height: 1.6; }

    /* --- Desktop: wider 2-column layout --- */
    @media (min-width: 640px) {
      .sdash__top {
        grid-template-columns: 1fr 1fr;
      }
      .sdash__temp-val { font-size: 5rem; }
      .sdash__statuses {
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
    }
    @media (min-width: 900px) {
      .sdash__inner { max-width: 900px; }
      .sdash__temp-val { font-size: 6rem; }
      .sdash__gauge-val { font-size: 3rem; }
      .sdash__status-val { font-size: 1.6rem; }
    }
  </style>
</head>

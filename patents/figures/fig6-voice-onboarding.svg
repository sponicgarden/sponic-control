<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#b45309"/></marker>
  </defs>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">FIG. 6 — AI Voice Onboarding Sequence Diagram (600)</text>

  <!-- Timeline actors -->
  <rect x="30" y="55" width="120" height="35" rx="6" fill="#fef3c7" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="77" text-anchor="middle" font-size="11" font-weight="bold">Vision (200)</text>
  <line x1="90" y1="90" x2="90" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="210" y="55" width="140" height="35" rx="6" fill="#fce7f3" stroke="#333" stroke-width="1.5"/>
  <text x="280" y="77" text-anchor="middle" font-size="11" font-weight="bold">Frequency Ctrl (630)</text>
  <line x1="280" y1="90" x2="280" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="420" y="55" width="130" height="35" rx="6" fill="#fce7f3" stroke="#333" stroke-width="1.5"/>
  <text x="485" y="77" text-anchor="middle" font-size="11" font-weight="bold">TTS Engine (610)</text>
  <line x1="485" y1="90" x2="485" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="620" y="55" width="130" height="35" rx="6" fill="#ede9fe" stroke="#333" stroke-width="1.5"/>
  <text x="685" y="77" text-anchor="middle" font-size="11" font-weight="bold">Speaker (400)</text>
  <line x1="685" y1="90" x2="685" y2="550" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step 1: Detect new arrivals -->
  <rect x="35" y="110" width="110" height="45" rx="4" fill="#fef9c3" stroke="#b45309" stroke-width="1"/>
  <text x="90" y="130" text-anchor="middle" font-size="9" font-weight="bold">Detect new</text>
  <text x="90" y="143" text-anchor="middle" font-size="9" font-weight="bold">arrivals (260)</text>
  <text x="25" y="118" font-size="9" font-weight="bold" fill="#b45309">1</text>

  <!-- Step 2: Notify frequency controller -->
  <line x1="145" y1="133" x2="268" y2="133" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="205" y="126" text-anchor="middle" font-size="9" fill="#333">new_person_count: N</text>
  <text x="153" y="126" font-size="9" font-weight="bold" fill="#b45309">2</text>

  <!-- Step 3: Check cooldown -->
  <rect x="220" y="160" width="120" height="70" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="280" y="178" text-anchor="middle" font-size="9" font-weight="bold">Check cooldown</text>
  <text x="280" y="195" text-anchor="middle" font-size="8" fill="#555">Last announcement</text>
  <text x="280" y="207" text-anchor="middle" font-size="8" fill="#555">&gt; cooldown_period?</text>
  <text x="280" y="222" text-anchor="middle" font-size="8" fill="#555">(default: 10 min)</text>
  <text x="210" y="168" font-size="9" font-weight="bold" fill="#b45309">3</text>

  <!-- Branch: YES → continue, NO → skip -->
  <line x1="340" y1="195" x2="380" y2="195" stroke="#999" stroke-width="1"/>
  <text x="360" y="189" font-size="8" fill="#dc2626">No →</text>
  <rect x="380" y="182" width="60" height="25" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="410" y="199" text-anchor="middle" font-size="8" fill="#dc2626">Skip</text>

  <line x1="280" y1="230" x2="280" y2="255" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="286" y="246" font-size="8" fill="#16a34a">Yes ↓</text>

  <!-- Step 4: Select template -->
  <rect x="220" y="258" width="120" height="50" rx="4" fill="#fce7f3" stroke="#333" stroke-width="1"/>
  <text x="280" y="278" text-anchor="middle" font-size="9" font-weight="bold">Select template</text>
  <text x="280" y="293" text-anchor="middle" font-size="8" fill="#555">Based on venue type</text>
  <text x="280" y="303" text-anchor="middle" font-size="8" fill="#555">(casual/professional)</text>
  <text x="210" y="268" font-size="9" font-weight="bold" fill="#b45309">4</text>

  <!-- Step 5: Generate speech -->
  <line x1="340" y1="283" x2="473" y2="283" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="405" y="276" text-anchor="middle" font-size="9" fill="#333">template + venue_type</text>
  <text x="348" y="276" font-size="9" font-weight="bold" fill="#b45309">5</text>

  <rect x="430" y="310" width="110" height="60" rx="4" fill="#fce7f3" stroke="#333" stroke-width="1"/>
  <text x="485" y="330" text-anchor="middle" font-size="9" font-weight="bold">TTS Synthesis</text>
  <text x="485" y="345" text-anchor="middle" font-size="8" fill="#555">Generate natural</text>
  <text x="485" y="358" text-anchor="middle" font-size="8" fill="#555">speech audio</text>

  <!-- Step 6: Play announcement -->
  <line x1="540" y1="340" x2="673" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="605" y="333" text-anchor="middle" font-size="9" fill="#333">audio stream</text>
  <text x="548" y="333" font-size="9" font-weight="bold" fill="#b45309">6</text>

  <!-- Announcement content box -->
  <rect x="595" y="360" width="180" height="60" rx="6" fill="#fef9c3" stroke="#b45309" stroke-width="1.5"/>
  <text x="685" y="380" text-anchor="middle" font-size="9" font-weight="bold" fill="#b45309">ANNOUNCEMENT PLAYS:</text>
  <text x="685" y="395" text-anchor="middle" font-size="8" fill="#555" font-style="italic">"Wave your hand to skip,</text>
  <text x="685" y="407" text-anchor="middle" font-size="8" fill="#555" font-style="italic">scan the QR code to control..."</text>

  <!-- Step 7: Reset cooldown -->
  <line x1="485" y1="370" x2="485" y2="440" stroke="#333" stroke-width="1"/>
  <line x1="485" y1="440" x2="292" y2="440" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="390" y="433" text-anchor="middle" font-size="9" fill="#333">reset cooldown timer</text>
  <text x="485" y="433" font-size="9" font-weight="bold" fill="#b45309">7</text>

  <rect x="220" y="450" width="120" height="30" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="280" y="470" text-anchor="middle" font-size="9" fill="#16a34a">Cooldown active</text>

  <!-- Loop back -->
  <path d="M 90 155 L 90 510 L 280 510 L 280 480" fill="none" stroke="#b45309" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#ab)"/>
  <text x="170" y="505" text-anchor="middle" font-size="10" font-weight="bold" fill="#b45309">CONTINUOUS MONITORING</text>

  <!-- Adaptive frequency note -->
  <rect x="30" y="530" width="740" height="40" rx="6" fill="#f9fafb" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="548" text-anchor="middle" font-size="10" fill="#666">Adaptive frequency: High crowd turnover (bar) → shorter cooldown (5 min) | Low turnover (hotel lobby) → longer cooldown (30 min)</text>
  <text x="400" y="562" text-anchor="middle" font-size="10" fill="#666">Returning visitors recognized via person re-identification → skip onboarding for known faces (no biometric storage)</text>
</svg>